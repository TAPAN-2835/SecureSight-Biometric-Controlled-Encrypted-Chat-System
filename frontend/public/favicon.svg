<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF" />
      <stop offset="100%" stop-color="#3A7BD5" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Shield -->
  <path d="M50 8 L18 22 V45 C18 68 32 84 50 92 C68 84 82 68 82 45 V22 L50 8 Z" fill="url(#shieldGrad)" stroke="#E0F7FA" stroke-width="3" stroke-linejoin="round" />
  
  <!-- Eye Shape -->
  <path d="M32 50 C42 40 58 40 68 50 C58 60 42 60 32 50 Z" fill="#ffffff" filter="url(#glow)" />
  
  <!-- Iris / Pupil -->
  <circle cx="50" cy="50" r="7.5" fill="#0A192F" />
  <circle cx="51.5" cy="48.5" r="2.5" fill="#00D2FF" />
</svg>
